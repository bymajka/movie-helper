<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 800 700"
  role="img"
  aria-labelledby="title"
>
  <title id="title">No Image Available</title>
  <!-- background -->
  <rect width="800" height="700" fill="#e2e8f0" />
  <!-- generic camera icon -->
  <g fill="#94a3b8">
    <rect x="220" y="240" width="360" height="220" rx="16" />
    <circle cx="400" cy="350" r="60" fill="#cbd5e1" />
    <rect x="300" y="210" width="200" height="40" rx="8" />
  </g>
  <!-- label -->
  <text
    x="50%"
    y="75%"
    text-anchor="middle"
    fill="#64748b"
    font-family="sans-serif"
    font-size="36"
  >No Image</text>
</svg>
